; Bicyclette Bruzoise – assets/api/.user.ini
; OVH hébergement mutualisé : surcharge des limites PHP pour l'upload photos.
; Ce fichier doit être placé dans le même dossier que upload.php
; (assets/api/.user.ini)
;
; Note : sur OVH Starter, upload_max_filesize est limité à 128M maximum.
; Les valeurs ci-dessous sont suffisantes pour un usage club (photos ~3-8 Mo).

upload_max_filesize = 20M
post_max_size       = 64M
max_execution_time  = 120
max_input_time      = 120
memory_limit        = 128M
